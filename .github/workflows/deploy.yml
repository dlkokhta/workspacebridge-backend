name: Deploy WorkspaceBridge Application
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/workspacebridge-backend
            git pull origin master
            npm install
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 startOrRestart ecosystem.config.js --update-env || pm2 restart workspacebridge-backend --update-env